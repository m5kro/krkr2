name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  VCPKG_INSTALL_OPTIONS: "--debug"
  CMAKE_BUILD_PARALLEL_LEVEL: 3

jobs:
  build-macos:
    name: Build macOS x86_64
    runs-on: macos-15-intel
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.act/vcpkg
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite
      MACOS_ARCH: x86_64
      VCPKG_TARGET_TRIPLET: x64-osx
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew update
          brew install autoconf automake autoconf-archive bison cmake libb2 nasm ninja yasm
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"
          ninja --version
          autoconf --version
          automake --version

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-macos-x64-osx-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg/ports/**', 'vcpkg/triplets/**') }}
          restore-keys: |
            vcpkg-macos-x64-osx-

      - name: Setup vcpkg
        run: |
          mkdir -p .vcpkg-cache
          if [ ! -d "$VCPKG_ROOT" ]; then
            git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"

      - name: Configure
        run: |
          cmake --preset="MacOS Release Config" \
            -DENABLE_TESTS=OFF \
            -DBUILD_TOOLS=OFF \
            -DVCPKG_TARGET_TRIPLET="$VCPKG_TARGET_TRIPLET" \
            -DCMAKE_OSX_ARCHITECTURES="$MACOS_ARCH" \
            -DBISON_EXECUTABLE="$(brew --prefix bison)/bin/bison"

      - name: Build
        run: cmake --build --preset="MacOS Release Build"

      - name: Package app
        run: |
          APP="out/macos/release/bin/krkr2/krkr2.app"
          test -d "$APP"
          lipo -info "$APP/Contents/MacOS/krkr2"
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "$APP" "artifacts/krkr2-x86_64.app.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: krkr2-macos-x86_64
          path: artifacts/krkr2-x86_64.app.zip
          if-no-files-found: error
